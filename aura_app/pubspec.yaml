name: aura_app
description: "AURA - AI 패션 코디 매칭"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Routing
  go_router: ^14.8.1

  # Supabase
  supabase_flutter: ^2.9.0

  # Networking
  http: ^1.3.0

  # Image
  cached_network_image: ^3.4.1
  image_picker: ^1.1.2
  flutter_svg: ^2.0.17

  # Local Cache
  sqflite: ^2.4.2

  # Fonts
  google_fonts: ^6.2.1

  # URL Launcher
  url_launcher: ^6.3.1

  # Utilities
  uuid: ^4.5.1

  # Environment
  flutter_dotenv: ^5.2.1

  # Monitoring
  sentry_flutter: ^8.13.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  riverpod_generator: ^2.6.3
  build_runner: ^2.4.15
  custom_lint: ^0.7.5
  riverpod_lint: ^2.6.3

flutter:
  uses-material-design: true

  assets:
    - .env

  fonts:
    - family: Lobster
      fonts:
        - asset: assets/fonts/Lobster-Regular.ttf
