name: Flutter CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  analyze-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: aura_app

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.2'
          channel: 'stable'
          cache: true

      - name: Create .env for CI
        run: |
          echo "SUPABASE_URL=https://example.supabase.co" > .env
          echo "SUPABASE_ANON_KEY=ci-test-key" >> .env
          echo "SENTRY_DSN=" >> .env
          echo "R2_PUBLIC_URL=" >> .env

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Run tests
        run: flutter test
